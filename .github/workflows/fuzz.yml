# One-shot fuzz run for the JWT parser surface.
#
# RFC 005 (v0.51.2): cesauth's JWS Compact deserializer in
# `cesauth_core::jwt::signer::verify` is independently-implemented code
# that processes potentially adversarial tokens on every request. This job
# runs libFuzzer for 60 seconds on PRs that touch the JWT parser or fuzz
# infrastructure, catching panics / OOM / DoS-via-super-linear-parsing that
# example-based tests miss.
#
# LONGER RUNS: to run locally without the 60-second cap:
#   cargo +nightly fuzz run jwt_parse
# For completely silent leak-on-exit false positives:
#   cargo +nightly fuzz run jwt_parse -- -detect_leaks=0
#
# FINDINGS: file as a security issue per .github/SECURITY.md; do NOT push
# the artifact in a public PR.

name: fuzz

on:
  pull_request:
    paths:
      - 'crates/core/src/jwt/**'
      - 'fuzz/**'
  # Allow manual dispatch for ad-hoc longer runs.
  workflow_dispatch:
    inputs:
      max_total_time:
        description: 'Max fuzz time in seconds (default: 60)'
        required: false
        default: '60'

jobs:
  jwt-parser:
    name: jwt_parse (libFuzzer, ${{ inputs.max_total_time || '60' }}s)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          # cargo-fuzz requires nightly for -Z unstable-options.
          # The rest of the workspace stays on stable 1.91.
          toolchain: nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: fuzz-${{ runner.os }}-${{ hashFiles('fuzz/Cargo.toml') }}
          restore-keys: fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run one-shot fuzz (jwt_parse)
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run jwt_parse \
            -- \
            -max_total_time=${{ inputs.max_total_time || '60' }} \
            -detect_leaks=0

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-jwt-parse
          path: fuzz/artifacts/jwt_parse/
          if-no-files-found: ignore
