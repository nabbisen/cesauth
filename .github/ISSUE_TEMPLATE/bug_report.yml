name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in
        as much of the form as you can — every field below makes
        the issue easier to triage.

        **Security-sensitive reports do not go here.** Use the
        private "Report a vulnerability" path on the Security tab,
        or follow [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what's wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, self-contained reproduction. A failing test, a curl invocation, or a sequence of clicks is ideal.
      placeholder: |
        1. Run `cargo test -p cesauth-core --lib`
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message, stack trace, or HTTP response if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cesauth version (or commit SHA)
      placeholder: "v0.0.0 / abc1234"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust toolchain, OS, wrangler version (if applicable), and any relevant configuration.
      placeholder: |
        - rustc 1.85.0
        - wrangler 4.x
        - macOS 14.5 / Ubuntu 24.04
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, references to related issues, anything else that helps.
    validations:
      required: false
