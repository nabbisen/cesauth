[package]
name        = "cesauth-frontend"
version.workspace     = true
edition.workspace     = true
rust-version.workspace = true
license.workspace     = true
repository.workspace  = true
authors.workspace     = true
description = "Typed, accessible UI components and HTML templates for cesauth login flows."

[lib]
# cdylib  — Trunk builds this to WASM for the browser (--features csr).
# rlib    — cargo/wrangler links this into cesauth-backend (no csr feature).
# Both must be present so trunk and cargo can each use the right artifact.
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
# Activate this ONLY when building with Trunk for the browser.
# cesauth-backend depends on this crate WITHOUT this feature;
# enabling it in the backend would pull browser-only WASM APIs
# into the Cloudflare Workers runtime, which is incompatible.
csr = [
    "dep:leptos",
    "dep:console_error_panic_hook",
    "leptos/csr",
]

[dependencies]
# Always present (both backend-linked rlib and Trunk cdylib).
cesauth-core = { path = "../core" }
time         = { workspace = true }

# Leptos — optional; only compiled when `csr` feature is active.
# Pin to 0.8.2: see RFC 115 §2 for the getrandom/uuid constraint.
leptos       = { version = "=0.8.2", optional = true }
# leptos_router is not needed for the Phase B PoC counter.
# It will be added in Phase C when real page routing is required.

# Browser debug helper — only meaningful in the cdylib/browser target.
console_error_panic_hook = { version = "0.1", optional = true }
